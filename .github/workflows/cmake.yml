name: CMake


on:
  push:
    paths:
      # C/C++ source and headers
      - '**/*.cpp'
      - '**/*.c'
      - '**/*.h'
      # Win32 resources
      - '**/*.rc'
      - '**/*.ico'
      - '**/*.manifest'
      # Build system
      - 'CMakeLists.txt'
      - 'cmake/*.cmake'
      - 'CMakePresets.json'
      - 'CMakeSettings.json'
      - 'vcpkg.json'
      - 'vcpkg-configuration.json'
      - 'vcpkg-overlays/**'
      # The workflow itself
      - '.github/workflows/cmake.yml'

jobs:
  build:
    runs-on: windows-2025-vs2026
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
#    - name: Setup Windows 10 SDK Action
#      uses: GuillaumeFalourd/setup-windows10-sdk-action@v2
#      with:
#        sdk-version: 22621

    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache vcpkg toolchain
      id: cache-vcpkg-tool
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg
        key: vcpkg-tool-${{ runner.os }}-ce613c41372b23b1f51333815feb3edd87ef8a8b

    - name: Install vcpkg
      if: steps.cache-vcpkg-tool.outputs.cache-hit != 'true'
      shell: bash
      env:
        VCPKG_COMMIT: ce613c41372b23b1f51333815feb3edd87ef8a8b
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        cd vcpkg
        git checkout "$VCPKG_COMMIT"
        ./bootstrap-vcpkg.bat

    - name: Set VCPKG_ROOT
      run: |
        echo "VCPKG_ROOT=$(Get-Location)\vcpkg" >> $env:GITHUB_ENV
      shell: powershell

    - name: Restore vcpkg binary cache
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/vcpkg-bincache
        key: vcpkg-bin-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json', 'vcpkg-overlays/**') }}
        restore-keys: |
          vcpkg-bin-${{ runner.os }}-

    - name: Restore FetchContent cache
      uses: actions/cache@v4
      with:
        path: ${{runner.workspace}}/GWToolboxpp/build/_deps
        key: deps-${{ runner.os }}-${{ hashFiles('cmake/*.cmake') }}
        restore-keys: |
          deps-${{ runner.os }}-

    - name: Restore vcpkg installed cache
      uses: actions/cache@v4
      with:
        path: ${{runner.workspace}}/GWToolboxpp/build/vcpkg_installed
        key: vcpkg-inst-${{ runner.os }}-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

    - name: Create Build Environment
      # Some projects don't allow in-source building, so create a separate build directory
      # We'll use this as our working directory for all subsequent commands
      run: cmake -E make_directory ${{runner.workspace}}/GWToolboxpp/build

    - name: Configure CMake
      # Use a bash shell so we can use the same syntax for environment variable
      # access regardless of the host operating system
      shell: bash
      working-directory: ${{runner.workspace}}/GWToolboxpp/build
      run: cmake $GITHUB_WORKSPACE --preset=vcpkg
      env:
        VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/vcpkg-bincache,readwrite"

    - name: Build
      working-directory: ${{runner.workspace}}/GWToolboxpp/build
      shell: bash
      # Execute the build.  You can specify a specific target with "--target <NAME>"
      run: cmake --build . --config RelWithDebInfo

    - name: Save output
      uses: actions/upload-artifact@v4
      with:
        path: ${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo/

    - name: Determine release version
      id: version
      if: github.ref == 'refs/heads/master'
      shell: bash
      run: |
        VERSION=$(sed -n 's/.*set(GWTOOLBOXDLL_VERSION "\(.*\)").*/\1/p' CMakeLists.txt | tr -d '\r')
        BETA=$(sed -n 's/.*set(GWTOOLBOXDLL_VERSION_BETA "\(.*\)").*/\1/p' CMakeLists.txt | tr -d '\r')

        if [ -z "$VERSION" ]; then
          echo "Could not find version in CMakeLists.txt"
          exit 1
        fi

        if [ -z "$BETA" ]; then
          TAG_NAME="${VERSION}_Release"
        else
          TAG_NAME="${VERSION}_${BETA}"
        fi

        echo "Detected version: $VERSION"
        echo "Detected beta: $BETA"
        echo "Target tag: $TAG_NAME"
        echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

        if git ls-remote --tags origin "refs/tags/$TAG_NAME" | grep -q .; then
          echo "Tag $TAG_NAME already exists. Skipping release."
          echo "should_release=false" >> "$GITHUB_OUTPUT"
        else
          echo "Tag $TAG_NAME does not exist. Will create release."
          echo "should_release=true" >> "$GITHUB_OUTPUT"
        fi

    # Signing is skipped automatically until SIGNPATH_ORGANIZATION_ID is set as a
    # repo variable, so releases keep working (unsigned) before SignPath is wired up.
    - name: Stage binaries for signing
      if: steps.version.outputs.should_release == 'true' && vars.SIGNPATH_ORGANIZATION_ID != ''
      shell: bash
      run: |
        BIN_DIR="${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo"
        mkdir -p to-sign
        cp "$BIN_DIR/GWToolbox.exe" to-sign/
        cp "$BIN_DIR/GWToolboxdll.dll" to-sign/

    - name: Upload unsigned binaries
      id: upload-unsigned
      if: steps.version.outputs.should_release == 'true' && vars.SIGNPATH_ORGANIZATION_ID != ''
      uses: actions/upload-artifact@v4
      with:
        name: unsigned-binaries
        path: to-sign/

    - name: Sign binaries with SignPath
      if: steps.version.outputs.should_release == 'true' && vars.SIGNPATH_ORGANIZATION_ID != ''
      uses: signpath/github-action-submit-signing-request@v2
      with:
        api-token: '${{ secrets.SIGNPATH_API_TOKEN }}'
        organization-id: '${{ vars.SIGNPATH_ORGANIZATION_ID }}'
        project-slug: 'GWToolboxpp'
        signing-policy-slug: 'release-signing'
        artifact-configuration-slug: 'binaries'
        github-artifact-id: '${{ steps.upload-unsigned.outputs.artifact-id }}'
        wait-for-completion: true
        output-artifact-directory: 'signed'

    - name: Create release
      if: steps.version.outputs.should_release == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        TAG_NAME="${{ steps.version.outputs.tag_name }}"
        BIN_DIR="${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo"

        # Prefer the SignPath-signed binaries; fall back to the build output if
        # signing was skipped (SignPath not configured yet).
        if [ -f signed/GWToolbox.exe ]; then
          EXE="signed/GWToolbox.exe"
          DLL="signed/GWToolboxdll.dll"
          echo "Releasing signed binaries."
        else
          EXE="$BIN_DIR/GWToolbox.exe"
          DLL="$BIN_DIR/GWToolboxdll.dll"
          echo "Releasing unsigned binaries (SignPath not configured)."
        fi

        gzip -c "$BIN_DIR/GWToolboxdll.pdb" > GWToolboxdll.pdb.gz

        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag "$TAG_NAME"
        git push origin "$TAG_NAME"

        gh release create "$TAG_NAME" \
          --title "$TAG_NAME" \
          "$EXE" "$DLL" GWToolboxdll.pdb.gz
