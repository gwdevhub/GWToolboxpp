name: CMake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.check.outputs.body }}
      dev_commit: ${{ steps.check.outputs.dev_commit }}
      dev_commit_short: ${{ steps.check.outputs.dev_commit_short }}
      tag: ${{ steps.check.outputs.tag }}
      beta_tag: ${{ steps.check.outputs.beta_tag }}
      run: ${{ steps.check.outputs.run }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Check for latest release
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BODY=$(gh api repos/gwdevhub/GWToolboxpp/releases/latest --jq .body)
        TAG=$(gh api repos/gwdevhub/GWToolboxpp/releases/latest --jq .tag_name)
        DEV_COMMIT=$(gh api repos/gwdevhub/GWToolboxpp/commits/dev --jq .sha)
        DEV_COMMIT_SHORT=${DEV_COMMIT::8}
        echo "Latest upstream release tag: $TAG"
        {
          echo "body<<EOF"
          echo "$BODY"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "dev_commit=$DEV_COMMIT" >> "$GITHUB_OUTPUT"
        echo "dev_commit_short=$DEV_COMMIT_SHORT" >> "$GITHUB_OUTPUT"

        if git show-ref --tags --quiet --verify "refs/tags/$TAG"; then
          if [[ -n "$(git tag -l "*_$DEV_COMMIT_SHORT")" ]]; then
            echo "Already processed."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New dev version detected."
            echo "run=dev" >> "$GITHUB_OUTPUT"
            echo "beta_tag=_Beta_$DEV_COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "New stable version detected."
          echo "run=true" >> "$GITHUB_OUTPUT"
        fi

  build:
    runs-on: windows-2025-vs2026
    needs: check
    if: needs.check.outputs.run != 'false'
    timeout-minutes: 30
    permissions:
      artifact-metadata: write
      attestations: write
      contents: write
      id-token: write
    env:
      BRANCH: ${{ needs.check.outputs.run == 'dev' && 'dev' || 'master' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ssh-key: ${{ secrets.ACTIONS_BOT_DEPLOY_KEY }}
        ref: ${{ env.BRANCH }}

    - name: Setup git
      run: |
        git remote add upstream https://github.com/gwdevhub/GWToolboxpp.git
        git fetch upstream
        git config --global user.email "bot@github.com"
        git config --global user.name "GitHub Actions Bot"

    - name: Merge from upstream
      env:
        MERGE_FROM: ${{ needs.check.outputs.run == 'dev' && format('refs/tags/{0}', needs.check.outputs.tag) || needs.check.outputs.dev_commit }}
      run: |
        git checkout $BRANCH
        git merge "${MERGE_FROM}" --no-edit

    - name: Setup Windows 10 SDK Action
      uses: GuillaumeFalourd/setup-windows10-sdk-action@v2
      with:
        sdk-version: 22621

    - name: Checkout submodules
      shell: bash
      run: git submodule update --init --recursive

    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat

    - name: Install rust
      uses: dtolnay/rust-toolchain@stable

    - name: Patch GWCA
      run: |
        git clone https://github.com/gwtasdevs/gwca-patcher.git
        cp .\Dependencies\GWCA\bin\gwca.dll .\gwca-patcher\gwca.dll
        cd .\gwca-patcher
        cargo run
        cd ..
        cp .\gwca-patcher\gwca.dll .\Dependencies\GWCA\bin\gwca.dll

    - name: Set VCPKG_ROOT
      run: |
        echo "VCPKG_ROOT=$(Get-Location)\vcpkg" >> $env:GITHUB_ENV
      shell: powershell

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Create Build Environment
      # Some projects don't allow in-source building, so create a separate build directory
      # We'll use this as our working directory for all subsequent commands
      run: cmake -E make_directory ${{runner.workspace}}/GWToolboxpp/build

    - name: Configure CMake
      # Use a bash shell so we can use the same syntax for environment variable
      # access regardless of the host operating system
      shell: bash
      working-directory: ${{runner.workspace}}/GWToolboxpp/build
      run: |
        CMAKE_ARGS="--preset=vcpkg"
        if [ "$IS_DEV_BUILD" = "true" ]; then
          CMAKE_ARGS="$CMAKE_ARGS -DGWTOOLBOXDLL_VERSION_BETA=$BETA_TAG"
        fi
        cmake $GITHUB_WORKSPACE $CMAKE_ARGS
      env:
        VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
        IS_DEV_BUILD: ${{ needs.check.outputs.run == 'dev' }}
        BETA_TAG: ${{ needs.check.outputs.beta_tag }}

    - name: Build
      working-directory: ${{runner.workspace}}/GWToolboxpp/build
      shell: bash
      # Execute the build.  You can specify a specific target with "--target <NAME>"
      run: cmake --build . --config RelWithDebInfo

    - name: Save output
      uses: actions/upload-artifact@v4
      with:
        path: ${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo/

    - name: Generate app token to access private plugins
      id: private-plugins-app-token
      continue-on-error: true
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ vars.PRIVATE_PLUGINS_CLIENT_ID }}
        private-key: ${{ secrets.PRIVATE_PLUGINS_KEY }}
        owner: gwtasdevs
        repositories: DialogsPlugins

    - name: Download private plugin assets
      id: private-plugins-download
      shell: bash
      env:
        GH_TOKEN: ${{ steps.private-plugins-app-token.outputs.token }}
        IS_DEV_BUILD: ${{ needs.check.outputs.run == 'dev' }}
      run: |
        if [ "$IS_DEV_BUILD" = "true" ]; then
          TAG=$(gh api repos/gwtasdevs/DialogsPlugins/releases --jq '[.[] | select(.prerelease)][0].tag_name')
        else
          TAG=""
        fi

        mkdir -p ./output-artifacts
        gh release download $TAG --repo gwtasdevs/DialogsPlugins --pattern "*.dll" --pattern "*.sigstore.json" --dir ./output-artifacts

    - name: Install Cosign
      uses: sigstore/cosign-installer@v4.1.1

    - name: Attest private plugins
      shell: bash
      run: |
        for file in ./output-artifacts/*.dll; do
          cosign verify-blob \
            --bundle "${file}.sigstore.json" \
            --certificate-identity-regexp "https://github.com/gwtasdevs/DialogsPlugins" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$file"
        done
        rm -rf ./output-artifacts/*.sigstore.json

    - name: Check version and create release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_NOTES: ${{ needs.check.outputs.body }}
        DEV_COMMIT_SHORT: ${{ needs.check.outputs.run == 'dev' && needs.check.outputs.dev_commit_short || '' }}
        BETA_TAG: ${{ needs.check.outputs.beta_tag }}
      run: |
        VERSION=$(sed -n 's/.*set(GWTOOLBOXDLL_VERSION "\(.*\)").*/\1/p' CMakeLists.txt | tr -d '\r')
        BETA=$(sed -n 's/.*set(GWTOOLBOXDLL_VERSION_BETA "\(.*\)").*/\1/p' CMakeLists.txt | tr -d '\r')

        if [ -z "$VERSION" ]; then
          echo "Could not find version in CMakeLists.txt"
          exit 1
        fi

        if [ -n "$DEV_COMMIT_SHORT" ]; then
          TAG_NAME="${VERSION}${BETA_TAG}"
        else
          if [ -z "$BETA" ]; then
            TAG_NAME="${VERSION}_Release"
          else
            TAG_NAME="${VERSION}_${BETA}"
          fi
        fi

        echo "Detected version: $VERSION"
        echo "Detected beta: $BETA"
        echo "Target tag: $TAG_NAME"

        # Check if tag exists
        if git show-ref --tags --quiet --verify "refs/tags/$TAG_NAME"; then
          echo "Tag $TAG_NAME already exists. Skipping release."
          exit 0
        fi

        echo "Pushing merge commit..."

        git push origin $BRANCH

        echo "Tag $TAG_NAME does not exist. Creating..."

        # Create tag
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag "$TAG_NAME"
        git push origin "$TAG_NAME"

        echo "Tag $TAG_NAME pushed. Creating release..."

        # Prepare artifacts
        mkdir -p ./output-artifacts
        BIN_DIR="${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo"
        for file in $BIN_DIR/*.dll; do
          cp "$file" ./output-artifacts
        done
        cp "${{runner.workspace}}/GWToolboxpp/Dependencies/GWCA/bin/gwca.dll" ./output-artifacts
        gzip -c "$BIN_DIR/GWToolboxdll.pdb" > ./output-artifacts/GWToolboxdll.pdb.gz

        # Create release
        if [ -n "$DEV_COMMIT_SHORT" ]; then
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "[$DEV_COMMIT_SHORT](https://github.com/gwdevhub/GWToolboxpp/commit/$DEV_COMMIT_SHORT)" \
            --prerelease \
            ./output-artifacts/*
        else
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$RELEASE_NOTES" \
            ./output-artifacts/*
        fi

    - name: Attest
      uses: actions/attest@v4
      with:
        subject-path: ./output-artifacts/*
