name: CMake

on:
  # schedule:
  #   - cron: "*/10 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      body: ${{ steps.check.outputs.body }}
      dev_commit: ${{ steps.check.outputs.dev_commit }}
      tag: ${{ steps.check.outputs.tag }}
      run: ${{ steps.check.outputs.run }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Check for latest release
      id: check
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        BODY=$(gh api repos/gwdevhub/GWToolboxpp/releases/latest --jq .body)
        TAG=$(gh api repos/gwdevhub/GWToolboxpp/releases/latest --jq .tag_name)
        DEV_COMMIT=$(gh api repos/gwdevhub/GWToolboxpp/commits/dev --jq .sha)
        echo "Latest upstream release tag: $TAG"
        {
          echo "body<<EOF"
          echo "$BODY"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        echo "dev_commit=$DEV_COMMIT" >> "$GITHUB_OUTPUT"

        if git show-ref --tags --quiet --verify "refs/tags/$TAG"; then
          if git show-ref --tags --quiet --verify "refs/tags/commit-$DEV_COMMIT"; then
            echo "Already processed."
            echo "run=false" >> "$GITHUB_OUTPUT"
          else
            echo "New dev version detected."
            echo "run=dev" >> "$GITHUB_OUTPUT"
          fi
        else
          echo "New stable version detected."
          echo "run=true" >> "$GITHUB_OUTPUT"
        fi

  merge:
    runs-on: ubuntu-latest
    needs: check
    if: needs.check.outputs.run != 'false'
    permissions:
      contents: write
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Merge from upstream master
      if: needs.check.outputs.run == 'true'
      env:
        TAG: ${{ needs.check.outputs.tag }}
      run: |
        git remote add upstream https://github.com/gwdevhub/GWToolboxpp.git
        git fetch upstream
        git checkout master
        git config --global user.email "bot@github.com"
        git config --global user.name "GitHub Actions Bot"
        git merge "refs/tags/${TAG}" --no-edit
        git push origin master

    - name: Merge from upstream dev
      if: needs.check.outputs.run == 'dev'
      env:
        DEV_COMMIT: ${{ needs.check.outputs.dev_commit }}
      run: |
        git remote add upstream https://github.com/gwdevhub/GWToolboxpp.git
        git fetch upstream
        git checkout -b dev
        git reset --hard origin/master
        git config --global user.email "bot@github.com"
        git config --global user.name "GitHub Actions Bot"
        git merge $DEV_COMMIT --no-edit
        git push origin dev -f

  build:
    runs-on: windows-latest
    needs: [check, merge]
    if: needs.check.outputs.run != 'false'
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
    - name: Setup Windows 10 SDK Action
      uses: GuillaumeFalourd/setup-windows10-sdk-action@v2
      with:
        sdk-version: 22621

    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        ref: ${{ needs.check.outputs.run == 'dev' && 'dev' || 'master' }}

    - name: Checkout submodules
      shell: bash
      run: git submodule update --init --recursive

    - name: Install vcpkg
      run: |
        git clone https://github.com/microsoft/vcpkg.git
        .\vcpkg\bootstrap-vcpkg.bat

    # - name: Install rust
    #   uses: dtolnay/rust-toolchain@stable

    # - name: Patch GWCA
    #   run: |
    #     git clone https://github.com/gwtasdevs/GWCA.git
    #     cp .\Dependencies\GWCA\bin\gwca.dll .\GWCA\gwca.dll
    #     cd .\GWCA
    #     cargo run
    #     cd ..
    #     cp .\GWCA\gwca.dll .\Dependencies\GWCA\bin\gwca.dll

    - name: Set VCPKG_ROOT
      run: |
        echo "VCPKG_ROOT=$(Get-Location)\vcpkg" >> $env:GITHUB_ENV
      shell: powershell

    - name: Export GitHub Actions cache environment variables
      uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

    - name: Create Build Environment
      # Some projects don't allow in-source building, so create a separate build directory
      # We'll use this as our working directory for all subsequent commands
      run: cmake -E make_directory ${{runner.workspace}}/GWToolboxpp/build

    - name: Configure CMake
      # Use a bash shell so we can use the same syntax for environment variable
      # access regardless of the host operating system
      shell: bash
      working-directory: ${{runner.workspace}}/GWToolboxpp/build
      run: cmake $GITHUB_WORKSPACE --preset=vcpkg
      env:
        VCPKG_ROOT: ${{ env.VCPKG_ROOT }}
        VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    - name: Build
      working-directory: ${{runner.workspace}}/GWToolboxpp/build
      shell: bash
      # Execute the build.  You can specify a specific target with "--target <NAME>"
      run: cmake --build . --config RelWithDebInfo

    - name: Save output
      uses: actions/upload-artifact@v4
      with:
        path: ${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo/

    - name: Check version and create release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        RELEASE_NOTES: ${{ needs.check.outputs.body }}
        DEV_COMMIT: ${{ needs.check.outputs.run == 'dev' && needs.check.outputs.dev_commit || '' }}
      run: |
        VERSION=$(sed -n 's/.*set(GWTOOLBOXDLL_VERSION "\(.*\)").*/\1/p' CMakeLists.txt | tr -d '\r')
        BETA=$(sed -n 's/.*set(GWTOOLBOXDLL_VERSION_BETA "\(.*\)").*/\1/p' CMakeLists.txt | tr -d '\r')

        if [ -z "$VERSION" ]; then
          echo "Could not find version in CMakeLists.txt"
          exit 1
        fi

        if [ -n "$DEV_COMMIT" ]; then
          TAG_NAME="commit-$DEV_COMMIT"
        else
          if [ -z "$BETA" ]; then
            TAG_NAME="${VERSION}_Release"
          else
            TAG_NAME="${VERSION}_${BETA}"
          fi
        fi

        echo "Detected version: $VERSION"
        echo "Detected beta: $BETA"
        echo "Target tag: $TAG_NAME"

        # Check if tag exists
        if git show-ref --tags --quiet --verify "refs/tags/$TAG_NAME"; then
          echo "Tag $TAG_NAME already exists. Skipping release."
          exit 0
        fi

        echo "Tag $TAG_NAME does not exist. Creating release."

        # Create tag
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git tag "$TAG_NAME"
        git push origin "$TAG_NAME"

        # Prepare artifacts
        BIN_DIR="${{runner.workspace}}/GWToolboxpp/bin/RelWithDebInfo"
        cp "$BIN_DIR/GWToolboxdll.dll" .
        cp "$BIN_DIR/RawDialogs.dll" .
        cp "$BIN_DIR/SpeedrunScriptingTools.dll" .
        gzip -c "$BIN_DIR/GWToolboxdll.pdb" > GWToolboxdll.pdb.gz

        # Create release
        if [ -n "$DEV_COMMIT" ]; then
          DEV_COMMIT_SHORT=${DEV_COMMIT::7}

          gh release create "$TAG_NAME" \
            --title "commit-$DEV_COMMIT_SHORT" \
            --notes "[$DEV_COMMIT_SHORT](https://github.com/gwdevhub/GWToolboxpp/commit/$DEV_COMMIT)" \
            --prerelease \
            GWToolboxdll.dll RawDialogs.dll SpeedrunScriptingTools.dll GWToolboxdll.pdb.gz
        else
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --notes "$RELEASE_NOTES" \
            GWToolboxdll.dll RawDialogs.dll SpeedrunScriptingTools.dll GWToolboxdll.pdb.gz
        fi
